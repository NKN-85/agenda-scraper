name: Actualizar agenda

on:
  workflow_dispatch:
  schedule:
    - cron: "0 9 * * 4"

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Ejecutar scraper
        run: python main.py

      - name: Configurar git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Comprobar cambios
        id: cambios
        run: |
          git add eventos_master.json
          if git diff --cached --quiet; then
            echo "hay_cambios=false" >> $GITHUB_OUTPUT
          else
            echo "hay_cambios=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit
        if: steps.cambios.outputs.hay_cambios == 'true'
        run: git commit -m "Actualiza agenda automática"

      - name: Rebase con remoto
        if: steps.cambios.outputs.hay_cambios == 'true'
        run: git pull --rebase origin main

      - name: Push
        if: steps.cambios.outputs.hay_cambios == 'true'
        run: git push origin main