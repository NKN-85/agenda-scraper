name: Actualizar evergreen mensual

on:
  schedule:
    - cron: "0 8 1 * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  actualizar-evergreen:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Ejecutar scraper evergreen
        run: python evergreen_scraper.py

      - name: Commit de cambios evergreen
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add evergreen_master.json evergreen_output.json
          git diff --cached --quiet || git commit -m "chore: actualiza evergreen mensual"
          git push